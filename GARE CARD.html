<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GARE CARD — Stock & Finance OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <!-- SVG filters: torn paper edges + grain -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="paperTear" x="-12%" y="-12%" width="124%" height="124%">
        <feTurbulence type="fractalNoise" baseFrequency="0.016 0.022" numOctaves="3" seed="7" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      <filter id="tapeTear" x="-20%" y="-30%" width="140%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.09" numOctaves="2" seed="3" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <div id="root"></div>

  <!-- ① Firebase SDK (compat v9) — must load before firebase-init.js -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- ② Config (user edits this file) + Init -->
  <script src="firebase-config.js"></script>
  <script src="src/firebase-init.js"></script>

  <!-- ③ React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ④ Data layer + Analytics + Firestore store (plain JS) -->
  <script src="src/data.js"></script>
  <script src="src/analytics.js"></script>
  <script src="src/firebase-store.js"></script>

  <!-- ⑤ UI components (Babel/JSX) — order matters -->
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/auth-screen.jsx"></script>
  <script type="text/babel" src="src/detail-modals.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/finance.jsx"></script>
  <script type="text/babel" src="src/inventory.jsx"></script>
  <script type="text/babel" src="src/item-detail.jsx"></script>
  <script type="text/babel" src="src/reports.jsx"></script>
  <script type="text/babel" src="src/pos-bridge.jsx"></script>
  <script type="text/babel" src="src/user-mgmt.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
